# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: ko-KR

# 타임존 설정 (한국 시간)
timezone: Asia/Seoul

# jekyll-seo-tag settings
# ↓ --------------------------

title: Jiwon's Tech Blog

tagline: 백엔드 개발자의 성장 기록 # 부제목

description: >-
  최지원의 백엔드 기술 블로그입니다. 공부한 내용을 기록하고 공유합니다.

# 사이트 주소 (마지막에 / 를 붙이지 마세요)
url: "https://wldnjs12.github.io"

github:
  username: wldnjs12

twitter:
  username: 

social:
  name: Choi Jiwon
  email: cjwcgz@gmail.com
  links:
    - "https://wldnjs12.github.io"
    
# Site Verification Settings
webmaster_verifications:
  google: 
  bing: 
  alexa: 
  yandex: 
  baidu: 
  facebook: 

# ↑ --------------------------

# Web Analytics Settings
analytics:
  google:
    id: 
  goatcounter:
    id: 
  umami:
    id: 
    domain: 
  matomo:
    id: 
    domain: 
  fathom:
    id: 

pageviews:
  provider: 

# 테마 모드 설정 (비워두면 시스템 설정을 따릅니다)
theme_mode: # [light | dark]

# 미디어 리소스 CDN (기본값 유지)
cdn: "https://chirpy-img.netlify.app"

# 사이드바 아바타 이미지 경로
avatar: "/assets/img/avatar.jpg" # 나중에 이 경로에 사진을 넣으세요!

social_preview_image: 

# 목차(TOC) 사용 여부
toc: true

comments:
  provider: # [disqus | utterances | giscus]

# 자산 설정
assets:
  self_host:
    enabled: 
    env: 

pwa:
  enabled: true 
  cache:
    enabled: true 
    deny_paths:

paginate: 10

baseurl: ""

# ------------ 이 아래 옵션들은 가급적 수정하지 마세요 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: 
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" 
      type: posts
    values:
      layout: post
      comments: true 
      toc: true 
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs 
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
